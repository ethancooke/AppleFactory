name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Superseded pushes / PR updates cancel in-flight runs (saves macOS minutes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test (Apple Silicon)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Cache SwiftPM
        uses: actions/cache@v6
        with:
          path: |
            .build
            ~/.swiftpm
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Toolchain
        run: |
          set -o pipefail
          xcodebuild -version
          swift --version

      - name: Build (debug)
        run: |
          set -o pipefail
          swift build

      - name: Build (release)
        run: |
          set -o pipefail
          swift build -c release

      - name: Test
        run: |
          set -o pipefail
          swift test

      - name: Verify the binary is arm64-only
        run: |
          set -o pipefail
          BIN=.build/release/AppTemplate
          file "$BIN"
          if lipo -archs "$BIN" 2>/dev/null | grep -qw x86_64; then
            echo "::error::AppTemplate contains an x86_64 slice; this project is Apple Silicon only."
            exit 1
          fi
          echo "arm64-only: OK"

  rebrand-smoke:
    name: Rebrand smoke test (rename + finalize build clean)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Rebrand a throwaway copy and build it
        run: |
          set -o pipefail
          Scripts/test-rename.sh
