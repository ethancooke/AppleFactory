name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, notarize, package
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so the build number (commit count) is accurate

      # Cache only the dependency clones, NOT .build — release artifacts compile clean so a
      # stale incremental object can never slip into a signed/notarized build.
      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: ~/.swiftpm
          key: spm-deps-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-deps-${{ runner.os }}-

      - name: Derive version from tag
        run: |
          set -euo pipefail
          # On a v* tag, use the tag (minus the leading "v") as the marketing version so the
          # artifacts match the release. Off a tag (workflow_dispatch), fall back to Info.plist.
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"
          fi
          # Monotonic build number from commit count.
          echo "BUILD=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Toolchain
        run: |
          set -o pipefail
          xcodebuild -version
          swift --version

      # Signing is opt-in: set the repo variable SIGNING_ENABLED=true and add the secrets below.
      # Without it, the release is ad-hoc signed (not notarized) — usable but Gatekeeper-blocked.
      - name: Import signing certificate
        if: ${{ vars.SIGNING_ENABLED == 'true' }}
        env:
          CERT_B64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PW: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KPW="$(openssl rand -base64 24)"
          security create-keychain -p "$KPW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KPW" "$KEYCHAIN"
          echo "$CERT_B64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | awk -F'"' '/Developer ID Application/{print $2; exit}')"
          if [[ -z "$IDENTITY" ]]; then echo "No Developer ID Application identity found"; exit 1; fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build & package
        env:
          SIGN_IDENTITY: ${{ env.SIGN_IDENTITY }}
          VERSION: ${{ env.VERSION }}
          BUILD: ${{ env.BUILD }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: bash Scripts/release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AppTemplate-${{ github.sha }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

      - name: Draft GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.dmg
            dist/*.dmg.sha256
            dist/*.zip
            dist/*.zip.sha256
